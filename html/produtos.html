<html lang="pt-PT">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
</head>

    <a href="index.html" style="text-decoration: none; font-size: 18px;">⬅ Voltar à página principal</a><br><br>

    <div id="lista-produtos">

        <a href="endereco.html" style="color: blue;">Editar / Cadastrar meu Endereço</a><br><br>
        
        <button onclick="confirmarCompra()" style="background-color: green; color: white; padding: 10px; font-weight: bold; cursor: pointer;">Confirmar Compra</button>
    </div>

    <script src="../javascript/produtos.js"></script>
